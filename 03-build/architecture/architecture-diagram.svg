<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Inter, Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f0f0f0">Driftless — System Architecture (Sprint 1)</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#888">localhost:3000 · CS-PD-2026</text>

  <!-- ===================== ZONES ===================== -->

  <!-- Zone: Browser -->
  <rect x="20" y="80" width="180" height="100" rx="8" fill="#1a1f2e" stroke="#3b4a6b" stroke-width="1.5"/>
  <text x="110" y="100" text-anchor="middle" font-size="11" fill="#7b8ec8" font-weight="600">BROWSER / USER</text>
  <rect x="38" y="108" width="144" height="56" rx="5" fill="#232b42" stroke="#4a5a7a" stroke-width="1"/>
  <text x="110" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#e0e6ff">React 19 + Vite</text>
  <text x="110" y="143" text-anchor="middle" font-size="10" fill="#8090b0">TypeScript · CSS Modules</text>
  <text x="110" y="156" text-anchor="middle" font-size="10" fill="#8090b0">localhost:5173</text>

  <!-- Zone: ASP.NET Core -->
  <rect x="270" y="70" width="380" height="390" rx="8" fill="#111820" stroke="#2e6b45" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="460" y="92" text-anchor="middle" font-size="11" fill="#4caf80" font-weight="600">ASP.NET CORE 10.0 BACKEND · localhost:5141</text>

  <!-- Controller box -->
  <rect x="290" y="100" width="340" height="60" rx="6" fill="#162a1e" stroke="#2e6b45" stroke-width="1"/>
  <text x="460" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#69d49a">DocumentationController</text>
  <text x="460" y="138" text-anchor="middle" font-size="10" fill="#5aac7a">/api/documentation/{markdown·openapi·typescript·json/routes·json/typescript}</text>
  <text x="460" y="151" text-anchor="middle" font-size="10" fill="#5aac7a">+ RepositoryController</text>

  <!-- Service row -->
  <rect x="290" y="178" width="100" height="68" rx="6" fill="#162a1e" stroke="#2e6b45" stroke-width="1"/>
  <text x="340" y="199" text-anchor="middle" font-size="11" font-weight="700" fill="#69d49a">GitService</text>
  <text x="340" y="215" text-anchor="middle" font-size="9" fill="#5aac7a">LibGit2Sharp</text>
  <text x="340" y="228" text-anchor="middle" font-size="9" fill="#5aac7a">CloneRepositoryAsync</text>
  <text x="340" y="240" text-anchor="middle" font-size="9" fill="#5aac7a">Cleanup</text>

  <rect x="410" y="178" width="100" height="68" rx="6" fill="#162a1e" stroke="#2e6b45" stroke-width="1"/>
  <text x="460" y="199" text-anchor="middle" font-size="11" font-weight="700" fill="#69d49a">AnalysisService</text>
  <text x="460" y="215" text-anchor="middle" font-size="9" fill="#5aac7a">Roslyn / CodeAnalysis</text>
  <text x="460" y="228" text-anchor="middle" font-size="9" fill="#5aac7a">Parse C# syntax trees</text>
  <text x="460" y="240" text-anchor="middle" font-size="9" fill="#5aac7a">Extract routes + schemas</text>

  <rect x="530" y="178" width="100" height="68" rx="6" fill="#162a1e" stroke="#2e6b45" stroke-width="1"/>
  <text x="580" y="199" text-anchor="middle" font-size="11" font-weight="700" fill="#69d49a">DocService</text>
  <text x="580" y="215" text-anchor="middle" font-size="9" fill="#5aac7a">Generate outputs:</text>
  <text x="580" y="228" text-anchor="middle" font-size="9" fill="#5aac7a">Markdown · OpenAPI</text>
  <text x="580" y="240" text-anchor="middle" font-size="9" fill="#5aac7a">TypeScript · JSON</text>

  <!-- Arrows: controller → services -->
  <line x1="460" y1="160" x2="340" y2="178" stroke="#2e6b45" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="460" y1="160" x2="460" y2="178" stroke="#2e6b45" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="460" y1="160" x2="580" y2="178" stroke="#2e6b45" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Models box -->
  <rect x="290" y="265" width="340" height="50" rx="6" fill="#162a1e" stroke="#2e6b45" stroke-width="1"/>
  <text x="460" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#69d49a">Models</text>
  <text x="460" y="300" text-anchor="middle" font-size="10" fill="#5aac7a">AnalyzeRepoRequest · AnalysisResult · RouteInfo · DocumentationResult</text>

  <!-- Arrows: services → models -->
  <line x1="340" y1="246" x2="380" y2="265" stroke="#2e6b45" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="460" y1="246" x2="460" y2="265" stroke="#2e6b45" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="580" y1="246" x2="540" y2="265" stroke="#2e6b45" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Swagger box -->
  <rect x="290" y="330" width="160" height="40" rx="6" fill="#1a1505" stroke="#8a6a00" stroke-width="1"/>
  <text x="370" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#e0b840">Swagger UI</text>
  <text x="370" y="362" text-anchor="middle" font-size="9" fill="#c09020">/swagger (dev only)</text>

  <!-- Program.cs box -->
  <rect x="470" y="330" width="160" height="40" rx="6" fill="#162a1e" stroke="#2e6b45" stroke-width="1"/>
  <text x="550" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#69d49a">Program.cs</text>
  <text x="550" y="362" text-anchor="middle" font-size="9" fill="#5aac7a">DI · CORS · Routing</text>

  <!-- Shared contracts -->
  <rect x="290" y="388" width="340" height="40" rx="6" fill="#1a1a2e" stroke="#5050a0" stroke-width="1"/>
  <text x="460" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="#9090e0">shared/contracts.ts</text>
  <text x="460" y="421" text-anchor="middle" font-size="9" fill="#7070c0">EndpointInfo · SchemaInfo · BreakingChange · SignalR event types</text>

  <!-- ===================== TEMP STORAGE ===================== -->
  <rect x="280" y="465" width="360" height="55" rx="8" fill="#1a1205" stroke="#7a5500" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="460" y="483" text-anchor="middle" font-size="11" fill="#c08000" font-weight="600">EPHEMERAL TEMP STORAGE</text>
  <text x="460" y="500" text-anchor="middle" font-size="10" fill="#a07000">OS Temp Directory — cloned repo lives here during one request lifecycle</text>
  <text x="460" y="514" text-anchor="middle" font-size="10" fill="#a07000">Deleted in finally{} block by GitService.Cleanup() after every request</text>

  <!-- Arrow: GitService → Temp -->
  <line x1="340" y1="246" x2="340" y2="465" stroke="#7a5500" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- ===================== GITHUB ===================== -->
  <rect x="700" y="120" width="165" height="75" rx="8" fill="#1a1a1a" stroke="#6e4f9a" stroke-width="1.5"/>
  <text x="782" y="142" text-anchor="middle" font-size="11" fill="#b080e0" font-weight="600">GITHUB (External)</text>
  <text x="782" y="160" text-anchor="middle" font-size="10" fill="#9060c0">Public git repositories</text>
  <text x="782" y="175" text-anchor="middle" font-size="10" fill="#9060c0">git clone (LibGit2Sharp)</text>

  <!-- Arrow: GitService → GitHub -->
  <line x1="630" y1="212" x2="700" y2="157" stroke="#6e4f9a" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="668" y="180" text-anchor="middle" font-size="9" fill="#8060b0" transform="rotate(-25, 668, 180)">clone</text>

  <!-- ===================== HTTP ARROWS ===================== -->

  <!-- Browser → Backend (POST requests) -->
  <line x1="200" y1="135" x2="268" y2="135" stroke="#5080c0" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="234" y="128" text-anchor="middle" font-size="9" fill="#6090d0">HTTP POST</text>
  <text x="234" y="142" text-anchor="middle" font-size="9" fill="#6090d0">/api/documentation/*</text>

  <!-- Backend → Browser (JSON response) -->
  <line x1="268" y1="150" x2="200" y2="150" stroke="#5080c0" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#arrow-blue)"/>
  <text x="234" y="163" text-anchor="middle" font-size="9" fill="#5070a0">JSON response</text>

  <!-- Shared contracts ↔ Frontend -->
  <line x1="290" y1="407" x2="182" y2="407" stroke="#5050a0" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="182" y1="407" x2="182" y2="164" stroke="#5050a0" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="182" y1="164" x2="200" y2="154" stroke="#5050a0" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-indigo)"/>
  <text x="165" y="290" text-anchor="middle" font-size="9" fill="#7070c0" transform="rotate(-90, 165, 290)">shared types</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="700" y="230" width="165" height="165" rx="8" fill="#111418" stroke="#444" stroke-width="1"/>
  <text x="782" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#ccc">Legend</text>

  <rect x="715" y="263" width="12" height="12" rx="2" fill="#162a1e" stroke="#2e6b45" stroke-width="1.5"/>
  <text x="736" y="274" font-size="10" fill="#9090a0">.NET / C# component</text>

  <rect x="715" y="283" width="12" height="12" rx="2" fill="#232b42" stroke="#4a5a7a" stroke-width="1.5"/>
  <text x="736" y="294" font-size="10" fill="#9090a0">React / TS component</text>

  <rect x="715" y="303" width="12" height="12" rx="2" fill="#1a1a1a" stroke="#6e4f9a" stroke-width="1.5"/>
  <text x="736" y="314" font-size="10" fill="#9090a0">External service</text>

  <rect x="715" y="323" width="12" height="12" rx="2" fill="#1a1205" stroke="#7a5500" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="736" y="334" font-size="10" fill="#9090a0">Ephemeral / temp</text>

  <line x1="715" y1="350" x2="727" y2="350" stroke="#5080c0" stroke-width="1.8"/>
  <text x="736" y="354" font-size="10" fill="#9090a0">HTTP request</text>

  <line x1="715" y1="368" x2="727" y2="368" stroke="#5080c0" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="736" y="372" font-size="10" fill="#9090a0">HTTP response / ref</text>

  <line x1="715" y1="386" x2="727" y2="386" stroke="#6e4f9a" stroke-width="1.5"/>
  <text x="736" y="390" font-size="10" fill="#9090a0">External git clone</text>

  <!-- ===================== AI ANNOTATIONS ===================== -->
  <rect x="20" y="220" width="230" height="235" rx="8" fill="#111418" stroke="#505050" stroke-width="1"/>
  <text x="135" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#ccc">AI Tool Annotations</text>

  <rect x="30" y="252" width="210" height="42" rx="5" fill="#1a1a1a" stroke="#404040" stroke-width="1"/>
  <text x="135" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#b0d0ff">Google Stitch</text>
  <text x="135" y="282" text-anchor="middle" font-size="9" fill="#8090a0">Scaffold: URL form, RouteCard,</text>
  <text x="135" y="293" text-anchor="middle" font-size="9" fill="#8090a0">TypeScriptPanel, About screens</text>

  <rect x="30" y="302" width="210" height="50" rx="5" fill="#1a1a1a" stroke="#404040" stroke-width="1"/>
  <text x="135" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#b0d0ff">Claude Code</text>
  <text x="135" y="332" text-anchor="middle" font-size="9" fill="#8090a0">DocumentationController, Roslyn</text>
  <text x="135" y="343" text-anchor="middle" font-size="9" fill="#8090a0">parsing, OpenAPI serialisation,</text>
  <text x="135" y="354" text-anchor="middle" font-size="9" fill="#8090a0">TypeScript template generation</text>

  <rect x="30" y="360" width="210" height="42" rx="5" fill="#1a1a1a" stroke="#404040" stroke-width="1"/>
  <text x="135" y="376" text-anchor="middle" font-size="10" font-weight="700" fill="#b0d0ff">GitHub Copilot</text>
  <text x="135" y="390" text-anchor="middle" font-size="9" fill="#8090a0">Inline completion: React hooks,</text>
  <text x="135" y="401" text-anchor="middle" font-size="9" fill="#8090a0">CSS modules, TS boilerplate</text>

  <text x="135" y="430" text-anchor="middle" font-size="9" fill="#606060">All AI output: human-reviewed,</text>
  <text x="135" y="442" text-anchor="middle" font-size="9" fill="#606060">locally tested, PR-reviewed before merge</text>
  <text x="135" y="454" text-anchor="middle" font-size="9" fill="#606060">No runtime AI in Sprint 1</text>

  <!-- ===================== ARROW MARKERS ===================== -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5080c0"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e6b45"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6e4f9a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7a5500"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5050a0"/>
    </marker>
  </defs>

  <!-- Sprint label -->
  <text x="450" y="600" text-anchor="middle" font-size="10" fill="#555">Sprint 1 scope — stateless, no auth, no database, public repos only</text>

</svg>
